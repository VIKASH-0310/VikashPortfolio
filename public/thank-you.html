<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message sent — Vikash M</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Work+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --text: #f5f5f5;
        --muted: #a3a3a3;
        --accent: #e5e5e5;
        --border: rgba(255, 255, 255, 0.12);
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-content: center;
        padding: 1.5rem;
        font-family: 'Work Sans', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        text-align: center;
      }
      h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(1.5rem, 4vw, 2rem);
        letter-spacing: -0.03em;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1.5rem;
        color: var(--muted);
        max-width: 36ch;
        margin-inline: auto;
        line-height: 1.55;
      }
      a {
        display: inline-block;
        padding: 0.65rem 1.35rem;
        font-weight: 600;
        color: #0a0a0a;
        background: var(--accent);
        border-radius: 999px;
        text-decoration: none;
      }
      a:hover {
        background: #fff;
      }
      a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Thanks — your message was sent.</h1>
      <p>I’ll get back to you as soon as I can.</p>
      <a href="/">Back to portfolio</a>
    </main>
  </body>
</html>
